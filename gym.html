<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GYM_PIGS Stimulus Calculator</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #0a0f1d; /* dark Nordic theme */
    color: #f0f0f0;
    font-family: "Courier New", monospace;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 {
    font-size: 2em;
    text-align: center;
    color: #e2c784; /* gold accent */
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  h1 svg {
    width: 32px;
    height: 32px;
    margin-right: 8px;
    fill: #e2c784;
  }
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .input-group input[type="range"] {
    width: 100%;
    height: 30px;
    background: #162341;
    border-radius: 5px;
    -webkit-appearance: none;
  }
  .input-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #e2c784;
    border-radius: 50%;
    cursor: pointer;
  }
  .effort-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .effort-button {
    flex: 1;
    margin-right: 4px;
    padding: 8px 4px;
    text-align: center;
    border: 1px solid #e2c784;
    background: #162341;
    color: #e2c784;
    font-size: 0.8em;
    cursor: pointer;
    border-radius: 4px;
  }
  .effort-button:last-child { margin-right: 0; }
  .effort-button.active {
    background: #e2c784;
    color: #162341;
  }
  .result-card {
    margin-top: 20px;
    padding: 16px;
    background: #1e2b48;
    border-radius: 8px;
    border: 1px solid #e2c784;
  }
  .result-card h2 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 1.3em;
  }
  .result-card .zone {
    font-size: 1.5em;
    font-weight: bold;
  }
  .result-card .description {
    margin-top: 6px;
    font-size: 0.95em;
  }
  .bottom-info {
    margin-top: 20px;
    font-size: 0.8em;
    color: #9a9a9a;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="container">
  <h1>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <!-- Simple pixelated pig icon -->
      <rect x="2" y="6" width="20" height="12" rx="2" ry="2"/>
      <rect x="4" y="4" width="4" height="2"/>
      <rect x="16" y="4" width="4" height="2"/>
      <rect x="4" y="18" width="4" height="2"/>
      <rect x="16" y="18" width="4" height="2"/>
    </svg>
    GYM_PIGS
  </h1>

  <div class="input-group">
    <label for="sets">Sets per session: <span id="sets-val">4</span></label>
    <input type="range" id="sets" min="1" max="8" value="4">
  </div>

  <div class="input-group">
    <label for="reps">Reps per set: <span id="reps-val">5</span></label>
    <input type="range" id="reps" min="1" max="15" value="5">
  </div>

  <div class="input-group">
    <label for="freq">Sessions per week: <span id="freq-val">3</span></label>
    <input type="range" id="freq" min="1" max="8" value="3">
  </div>

  <div class="input-group">
    <label>Effort (RIR):</label>
    <div class="effort-buttons" id="effort-buttons">
      <!-- Buttons will be inserted by script -->
    </div>
  </div>

  <div class="result-card" id="result-card">
    <h2>Result</h2>
    <div class="zone" id="zone">Gaining</div>
    <div class="description" id="description"></div>
  </div>

  <div class="bottom-info" id="bottom-info">
    <!-- Context info will appear here -->
  </div>
</div>

<script>
(function(){
  // Base stimulus and decay constants (for 1–5 reps at ≤6RM load)
  const baseStimTable = {1:2.00, 2:3.95, 3:5.80, 4:7.50, 5:9.00};
  const baseDcTable   = {1:0.003, 2:0.006, 3:0.010, 4:0.016, 5:0.024};
  // RIR multipliers for decay; "failure" uses same 3.5× penalty as 0 RIR
  const rirMultipliers = {5:0.3, 4:0.5, 3:0.7, 2:1.0, 1:1.8, 0:3.5, "failure":3.5};
  // Weekly stimulus zone thresholds: adjust to taste
  const zoneThresholds = {
    under: 15,      // undertraining threshold
    maintain: 25,   // maintenance threshold
    gain: 40,       // gaining threshold
    max: 55         // gainmaxxing threshold; above this is wasteful
  };

  // Effort options
  const effortOptions = [
    {label:'Failure', value:'failure'},
    {label:'0 RIR', value:'0'},
    {label:'1 RIR', value:'1'},
    {label:'2 RIR', value:'2'},
    {label:'3 RIR', value:'3'},
    {label:'4 RIR', value:'4'},
    {label:'5 RIR', value:'5'}
  ];
  let currentEffort = '2';

  // Insert effort buttons
  function createEffortButtons() {
    const container = document.getElementById('effort-buttons');
    container.innerHTML = '';
    effortOptions.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'effort-button' + (opt.value === currentEffort ? ' active' : '');
      btn.textContent = opt.label;
      btn.dataset.value = opt.value;
      btn.addEventListener('click', () => {
        currentEffort = opt.value;
        updateEffortButtons();
        calculate();
      });
      container.appendChild(btn);
    });
  }
  function updateEffortButtons() {
    document.querySelectorAll('.effort-button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === currentEffort);
    });
  }

  // Calculate effective high‑tension reps for rep ranges above 5
  function effectiveReps(reps) {
    return reps <= 5 ? reps : 3;
  }

  // Quadratic quality decay formula: QF(n) = 1 − dc × n(n − 1)/2
  function qualityDecay(dc, setIndex) {
    return 1 - dc * setIndex * (setIndex - 1) / 2;
  }

  // Perform calculations and update UI
  function calculate() {
    const sets = parseInt(document.getElementById('sets').value, 10);
    const reps = parseInt(document.getElementById('reps').value, 10);
    const freq = parseInt(document.getElementById('freq').value, 10);
    const rir = currentEffort;

    // Update display of range values
    document.getElementById('sets-val').textContent = sets;
    document.getElementById('reps-val').textContent = reps;
    document.getElementById('freq-val').textContent = freq;

    // Determine base stimulus and base decay
    let baseStim, baseDc;
    if (reps <= 5) {
      baseStim = baseStimTable[reps];
      baseDc   = baseDcTable[reps];
    } else {
      // Estimate for 6–15 reps: scale from 5‑rep anchor by effective reps
      const eff = effectiveReps(reps);
      baseStim = baseStimTable[5] * (eff / 5);
      baseDc   = baseDcTable[5] * (eff / 5);
    }

    // Apply RIR multiplier to decay
    const dcMultiplier = rirMultipliers[rir];
    const actualDc = baseDc * dcMultiplier;

    // Determine quality‑factor floor based on frequency: lower frequency means lower floor
    const qfFloor = freq <= 2 ? 0.75 : (freq <= 3 ? 0.80 : (freq <= 4 ? 0.82 : 0.85));

    // Sum session stimulus across sets above quality floor
    let sessionStim = 0;
    let validSets   = 0;
    for (let i = 1; i <= sets; i++) {
      const qf   = qualityDecay(actualDc, i);
      const stim = baseStim * qf;
      if (qf >= qfFloor) {
        sessionStim += stim;
        validSets++;
      }
    }
    // Weekly stimulus
    const weeklyStim = sessionStim * freq;

    // Choose zone and wording
    let zone, description;
    if (weeklyStim < zoneThresholds.under) {
      zone = 'Undertraining';
      description = 'Insufficient weekly exposure. Increase sets or frequency.';
    } else if (weeklyStim < zoneThresholds.maintain) {
      zone = 'Maintaining';
      description = 'Maintenance dose. Enough to preserve but not necessarily build.';
    } else if (weeklyStim < zoneThresholds.gain) {
      zone = 'Gaining';
      description = 'Productive growth dose: enough weekly exposure with clean set quality.';
    } else if (weeklyStim < zoneThresholds.max) {
      zone = 'Gainmaxxing';
      description = 'Aggressive growth dose: high volume with challenging recovery.';
    } else {
      zone = 'Wasteful';
      description = 'Dose exceeds usable threshold; extra volume yields diminishing returns.';
    }
    // Effort contextual warnings
    if (rir === 'failure') {
      description += ' You selected failure training; use sparingly because fatigue cost is high.';
    } else if (rir === '0') {
      description += ' Zero RIR raises fatigue cost significantly.';
    }

    // Bottom explanatory text
    let bottom = '';
    bottom += reps <= 5
      ? 'Load-qualified: all performed reps count as high-tension work. '
      : 'Endpoint-biased: only the final few reps contribute high-tension stimulus. ';
    bottom += 'All selected sets stay above the quality floor. ';
    if (freq >= 5) {
      bottom += 'High frequency pushes recovery capacity; ensure adequate rest.';
    } else if (freq === 1) {
      bottom += 'Low frequency may require higher effort or more sets per session.';
    } else {
      bottom += 'Moderate frequency balances stimulus and recovery.';
    }

    // Update UI
    document.getElementById('zone').textContent = zone;
    document.getElementById('description').textContent = description;
    document.getElementById('bottom-info').textContent = bottom;

    // Highlight border colour if in higher zones (optional)
    const resultCard = document.getElementById('result-card');
    resultCard.style.borderColor =
      zone === 'Gainmaxxing' || zone === 'Wasteful' ? '#e67474' : '#e2c784';
  }

  // Initialise inputs and listeners
  function init() {
    createEffortButtons();
    ['sets','reps','freq'].forEach(id => {
      document.getElementById(id).addEventListener('input', calculate);
    });
    calculate();
  }

  // Run init when document is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();
</script>
</body>
</html>
